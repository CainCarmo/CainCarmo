name: Update Streak Stats
on:
  schedule:
    - cron: "0 0 * * *"
  push:
    paths:
      - ".github/workflows/streak-stats.yml"
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate Streak Stats
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=${{ github.repository_owner }}&theme=gruvbox&card_height=150&border_radius=6&hide_border=true
          path: "assets/images/streak-stats.svg"
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit Streak Stats
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/images/streak-stats.svg
          git commit -m "docs: Update streak stats" || exit 0
          git push